name: security-bench

# Three triggers:
#   1. workflow_dispatch — manual run for ad-hoc verification.
#   2. schedule (Mondays 06:00 UTC) — weekly publish-to-main pass that
#      regenerates BENCHMARKS.md and commits the JSON deltas back.
#   3. pull_request, path-scoped — Layer 4.4 PR gate. The bench takes
#      ~30 min of API time, so we can't run it on every PR; we *can* run
#      it when the PR touches the security/orchestration surface, which
#      is exactly when ASR regression matters most. ``run_suites.py`` already
#      exits 1 when the suite ASR exceeds ``benchmarks/thresholds.json``,
#      so the gate is just a workflow-level wiring change — no harness work.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  pull_request:
    paths:
      - "backend/services/security_engine.py"
      - "backend/services/governance.py"
      - "backend/services/hub_router.py"
      - "backend/services/chat_orchestrator.py"
      - "backend/services/security_gate.py"
      - "backend/services/turn_lifecycle.py"
      - "backend/services/turn_router.py"
      - "backend/services/worker_dispatch.py"
      - "backend/services/escalation_ladder.py"
      - "backend/tests/agentdojo/**"
      - "benchmarks/thresholds.json"
      - ".github/workflows/security-bench.yml"

# The scheduled / dispatch runs commit BENCHMARKS.md + suite JSON back to
# main with [skip ci]; PR runs are read-only (the commit-back step is
# guarded by ``if: github.event_name != 'pull_request'``). ``contents: write``
# is needed for the publish-to-main path; PR runs only need ``contents: read``
# but workflow-level permissions can't differ per trigger, so we keep
# ``contents: write`` and rely on the step guard to keep PR runs safe.
permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the commit-back step can fast-forward main
          # cleanly. The default GITHUB_TOKEN ships with every repo and,
          # combined with the workflow-level ``contents: write`` above,
          # is enough to push back into the same repo — no PAT, no deploy
          # key, no extra setup.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Graceful skip when the repo doesn't have ANTHROPIC_API_KEY configured.
      # The bench is path-triggered on any PR touching the security/orchestration
      # surface, so commits that legitimately edit (or just docstring-touch)
      # those files would otherwise red-X the PR even though no API access is
      # available. Adds `if: env.ANTHROPIC_API_KEY != ''` to every step that
      # would actually call the API; pairs with a single "Notice" step that
      # leaves an Actions annotation when skipping. Add the secret under
      # Settings → Secrets and variables → Actions to re-enable full coverage.
      - name: Notice if ANTHROPIC_API_KEY missing
        if: env.ANTHROPIC_API_KEY == ''
        run: |
          echo "::notice::ANTHROPIC_API_KEY secret not configured; skipping AgentDojo bench. Add the secret under Settings → Secrets and variables → Actions to enable."

      - name: Install runtime + bench dependencies
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-bench.txt

      - name: Run AgentDojo — workspace
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          python -m backend.tests.agentdojo.run_suites \
            --suite workspace --output benchmarks/workspace.json

      - name: Run AgentDojo — slack
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          python -m backend.tests.agentdojo.run_suites \
            --suite slack --output benchmarks/slack.json

      - name: Run AgentDojo — banking
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          python -m backend.tests.agentdojo.run_suites \
            --suite banking --output benchmarks/banking.json

      - name: Run AgentDojo — travel
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          python -m backend.tests.agentdojo.run_suites \
            --suite travel --output benchmarks/travel.json

      - name: Generate BENCHMARKS.md
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          python build-scripts/generate_benchmarks_md.py \
            --benchmarks-dir benchmarks \
            --thresholds benchmarks/thresholds.json \
            --output BENCHMARKS.md

      # Commit the results + regenerated markdown back into main. ``[skip ci]``
      # in the message keeps GitHub from retriggering the workflow on its own
      # push. PR runs skip this step entirely — a forked-PR commit-back would
      # require special tokens we don't want to grant, and even for same-repo
      # PRs we don't want every PR to mutate main with a fresh bench delta.
      # If nothing changed (utility/ASR often match the previous run exactly),
      # git commit exits non-zero and we swallow it so the workflow still
      # goes green.
      - name: Commit results back to main
        if: env.ANTHROPIC_API_KEY != '' && github.event_name != 'pull_request'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add benchmarks/*.json BENCHMARKS.md
          if git diff --staged --quiet; then
            echo "No bench delta — nothing to commit."
            exit 0
          fi
          git commit -m "bench: refresh AgentDojo results [skip ci]"
          git push origin HEAD:main
