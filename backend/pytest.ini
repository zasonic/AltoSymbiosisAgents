[pytest]
markers =
    slow: marks tests as slow (deselected by default; run with `-m slow` to include)
addopts = -m "not slow"
# tests/agentdojo/ is a bench harness that depends on the optional
# `agentdojo` package (declared in requirements-bench.txt, never in
# requirements.txt). Excluding it here keeps `pytest tests/` clean in
# production environments where the bench dep is not installed.
# .hypothesis is the falsifying-example DB hypothesis writes alongside
# tests; it has no Python files and pytest doesn't need to scan it.
# Pytest's default norecursedirs (.* etc.) is replaced when this option
# is set, so we re-include the dot-prefix patterns explicitly.
norecursedirs = agentdojo .hypothesis .* build dist *.egg
